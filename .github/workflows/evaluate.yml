name: Evaluate Submission

on: [push]

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        id: tests
        run: |
          pytest test_solution.py -v 2>&1 | tee results.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Report to backend
        run: |
          curl -X POST https://49bd-41-69-196-34.ngrok-free.app/submissions/result \
            -H "Content-Type: application/json" \
            -d "{
              \"challenge_id\": \"hello-world\",
              \"commit_sha\": \"${{ github.sha }}\",
              \"status\": \"${{ steps.tests.outputs.exit_code == '0' && 'passed' || 'failed' }}\",
              \"output\": \"$(cat results.txt | tr '\"' "'" | tr '\n' ' ')\"
            }"